name: CD — Update Manifests in deploy-dev for ArgoCD

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Image tag pushed by CI'
        required: true

permissions:
  contents: write

jobs:
  update-manifests:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout deploy-dev branch
      uses: actions/checkout@v4
      with:
        ref: deploy-dev
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Update image tags in manifests
      run: |
        ECR=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
        VERSION=${{ inputs.version }}

        sed -i "s|image:.*demo/backend.*|image: $ECR/demo/backend:$VERSION|g"  k8s/backend/deployment.yaml
        sed -i "s|image:.*demo/frontend.*|image: $ECR/demo/frontend:$VERSION|g" k8s/frontend/deployment.yaml

    - name: Commit and push to deploy-dev
      run: |
        git config user.name  "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add k8s/backend/deployment.yaml k8s/frontend/deployment.yaml
        git commit -m "deploy: ${{ inputs.version }}"
        git push origin deploy-dev
