name: CI — Build & Push to Harbor

on:
  push:
    branches:
      - main    # triggers when dev team pushes code

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set VERSION from git SHA (short)
      run: echo "VERSION=${GITHUB_SHA::8}" >> $GITHUB_ENV
      # e.g. VERSION=a1b2c3d4
      # If you want to use git tags instead, push a tag and change the trigger to:
      # on: push: tags: ['v*']
      # and use: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

    - name: Login to Harbor registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.HARBOR_URL }}
        username: ${{ secrets.HARBOR_USERNAME }}
        password: ${{ secrets.HARBOR_PASSWORD }}

    - name: Build & push backend
      run: |
        docker build -t ${{ secrets.HARBOR_URL }}/demo/backend:$VERSION ./app/backend
        docker push ${{ secrets.HARBOR_URL }}/demo/backend:$VERSION

    - name: Build & push frontend
      run: |
        docker build -t ${{ secrets.HARBOR_URL }}/demo/frontend:$VERSION ./app/frontend
        docker push ${{ secrets.HARBOR_URL }}/demo/frontend:$VERSION

    - name: Trigger CD workflow
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'cd.yml',
            ref: 'main',
            inputs: { version: process.env.VERSION }
          })
      env:
        VERSION: ${{ env.VERSION }}
