name: CI — Build & Push Images

on:
  push:
    tags:
      - 'v*'   # triggers on git tag like v1.0.0

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set VERSION from git tag
      run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to ECR
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build & push backend
      run: |
        docker build -t $ECR_REGISTRY/demo/backend:$VERSION ./app/backend
        docker push $ECR_REGISTRY/demo/backend:$VERSION

    - name: Build & push frontend
      run: |
        docker build -t $ECR_REGISTRY/demo/frontend:$VERSION ./app/frontend
        docker push $ECR_REGISTRY/demo/frontend:$VERSION

    - name: Trigger CD workflow
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: 'cd.yml',
            ref: 'main',
            inputs: { version: process.env.VERSION }
          })
      env:
        VERSION: ${{ env.VERSION }}
